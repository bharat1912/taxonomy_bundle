<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 640">
<style>
  text { font-family: sans-serif; }
  .th { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 11px; fill: #555; }
  .gray   { fill: #f0eeea; stroke: #888; }
  .teal   { fill: #d4f0e6; stroke: #0f7a5a; }
  .purple { fill: #e8e6fc; stroke: #5a4fc4; }
  .amber  { fill: #fdf0d0; stroke: #c47a10; }
  .coral  { fill: #fce8e0; stroke: #b84020; }
  rect { stroke-width: 1; rx: 6; }
  line { stroke: #aaa; stroke-width: 0.8; fill: none; }
  .leg-label { font-size: 11px; fill: #444; }
</style>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<!-- Entry -->
<rect class="gray" x="390" y="20" width="120" height="36" rx="6"/>
<text class="th" x="450" y="43" text-anchor="middle">copy</text>

<!-- Annotation row -->
<rect class="teal" x="80" y="100" width="90" height="36" rx="6"/>
<text class="th" x="125" y="123" text-anchor="middle">bakta</text>
<rect class="teal" x="190" y="100" width="90" height="36" rx="6"/>
<text class="th" x="235" y="123" text-anchor="middle">prokka</text>
<rect class="gray" x="355" y="100" width="190" height="36" rx="6"/>
<text class="th" x="450" y="123" text-anchor="middle">annotate</text>
<rect class="teal" x="570" y="100" width="100" height="36" rx="6"/>
<text class="th" x="620" y="123" text-anchor="middle">checkm2</text>
<rect class="teal" x="690" y="100" width="140" height="36" rx="6"/>
<text class="th" x="760" y="123" text-anchor="middle">assembly_stats</text>

<!-- Advanced annotation row -->
<rect class="purple" x="20"  y="185" width="90"  height="36" rx="6"/>
<text class="th" x="65"  y="208" text-anchor="middle">eggnog</text>
<rect class="purple" x="125" y="185" width="115" height="36" rx="6"/>
<text class="th" x="182" y="208" text-anchor="middle">interproscan</text>
<rect class="purple" x="255" y="185" width="80"  height="36" rx="6"/>
<text class="th" x="295" y="208" text-anchor="middle">dbcan</text>
<rect class="purple" x="350" y="185" width="100" height="36" rx="6"/>
<text class="th" x="400" y="208" text-anchor="middle">amrfinder</text>
<rect class="purple" x="465" y="185" width="100" height="36" rx="6"/>
<text class="th" x="515" y="208" text-anchor="middle">antismash</text>
<rect class="purple" x="580" y="185" width="120" height="36" rx="6"/>
<text class="th" x="640" y="208" text-anchor="middle">kegg_pathway</text>
<rect class="purple" x="715" y="185" width="60"  height="36" rx="6"/>
<text class="th" x="745" y="208" text-anchor="middle">mlst</text>

<!-- Phylogenetic row -->
<rect class="amber" x="20"  y="270" width="100" height="36" rx="6"/>
<text class="th" x="70"  y="293" text-anchor="middle">mashtree</text>
<rect class="amber" x="135" y="270" width="90"  height="36" rx="6"/>
<text class="th" x="180" y="293" text-anchor="middle">gtdbtk</text>
<rect class="amber" x="240" y="270" width="90"  height="36" rx="6"/>
<text class="th" x="285" y="293" text-anchor="middle">fasttree</text>
<rect class="amber" x="345" y="270" width="80"  height="36" rx="6"/>
<text class="th" x="385" y="293" text-anchor="middle">iqtree</text>
<rect class="amber" x="440" y="270" width="100" height="36" rx="6"/>
<text class="th" x="490" y="293" text-anchor="middle">snp_dists</text>
<rect class="amber" x="555" y="270" width="120" height="36" rx="6"/>
<text class="th" x="615" y="293" text-anchor="middle">treecluster</text>

<!-- Core-pan row -->
<rect class="coral" x="150" y="355" width="100" height="36" rx="6"/>
<text class="th" x="200" y="378" text-anchor="middle">panaroo</text>
<rect class="coral" x="320" y="355" width="90"  height="36" rx="6"/>
<text class="th" x="365" y="378" text-anchor="middle">gapseq</text>

<!-- Report -->
<rect class="gray" x="330" y="440" width="190" height="40" rx="8"/>
<text class="th" x="425" y="465" text-anchor="middle">report (HTML)</text>

<!-- Arrows: copy → annotation -->
<line x1="430" y1="56" x2="160" y2="100" marker-end="url(#arr)"/>
<line x1="450" y1="56" x2="450" y2="100" marker-end="url(#arr)"/>
<line x1="465" y1="56" x2="610" y2="100" marker-end="url(#arr)"/>
<line x1="475" y1="56" x2="740" y2="100" marker-end="url(#arr)"/>

<!-- annotate → advanced -->
<line x1="385" y1="136" x2="90"  y2="185" marker-end="url(#arr)"/>
<line x1="400" y1="136" x2="182" y2="185" marker-end="url(#arr)"/>
<line x1="415" y1="136" x2="295" y2="185" marker-end="url(#arr)"/>
<line x1="440" y1="136" x2="400" y2="185" marker-end="url(#arr)"/>
<line x1="460" y1="136" x2="510" y2="185" marker-end="url(#arr)"/>
<line x1="475" y1="136" x2="635" y2="185" marker-end="url(#arr)"/>

<!-- annotate → phylogenetic -->
<line x1="390" y1="136" x2="280" y2="270" marker-end="url(#arr)"/>
<line x1="405" y1="136" x2="385" y2="270" marker-end="url(#arr)"/>

<!-- copy → phylogenetic -->
<line x1="400" y1="56" x2="70"  y2="270" marker-end="url(#arr)"/>
<line x1="410" y1="56" x2="175" y2="270" marker-end="url(#arr)"/>

<!-- annotate → core-pan -->
<line x1="395" y1="136" x2="200" y2="355" marker-end="url(#arr)"/>

<!-- annotate/copy → gapseq -->
<line x1="450" y1="136" x2="365" y2="355" marker-end="url(#arr)"/>

<!-- phylo → treecluster/snp -->
<line x1="425" y1="306" x2="490" y2="355" marker-end="url(#arr)" stroke-dasharray="3 2"/>
<line x1="430" y1="306" x2="620" y2="355" marker-end="url(#arr)" stroke-dasharray="3 2"/>

<!-- → report -->
<line x1="200" y1="391" x2="370" y2="440" marker-end="url(#arr)"/>
<line x1="425" y1="306" x2="425" y2="440" marker-end="url(#arr)"/>
<line x1="615" y1="306" x2="510" y2="440" marker-end="url(#arr)"/>

<!-- Legend -->
<rect x="20" y="510" width="860" height="100" rx="8" fill="none" stroke="#ddd" stroke-width="1"/>
<text class="ts" x="450" y="533" text-anchor="middle" font-weight="600">Colour = rule group</text>

<rect class="gray"   x="30"  y="548" width="16" height="16" rx="3"/>
<text class="leg-label" x="52"  y="560">Entry / output</text>

<rect class="teal"   x="170" y="548" width="16" height="16" rx="3"/>
<text class="leg-label" x="192" y="560">Q.C. + annotation</text>

<rect class="purple" x="340" y="548" width="16" height="16" rx="3"/>
<text class="leg-label" x="362" y="560">Advanced annotation</text>

<rect class="amber"  x="530" y="548" width="16" height="16" rx="3"/>
<text class="leg-label" x="552" y="560">Phylogenetics</text>

<rect class="coral"  x="680" y="548" width="16" height="16" rx="3"/>
<text class="leg-label" x="702" y="560">Core-pan / metabolic</text>

<text class="ts" x="450" y="596" text-anchor="middle">All tools feed into the final HTML report — open in any browser</text>
</svg>