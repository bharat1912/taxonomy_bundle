[busco_run]
# ============================================================
# Low-level BUSCO parameters (overrides defaults if needed)
# ============================================================

# Force overwrite of previous runs
force = True

# Download path for BUSCO datasets
# Use a relative path to make the workflow portable and GitHub-safe.
# Users can override locally if needed.
download_path = ./db_link/busco

# Datasets version to use (e.g., odb12)
datasets_version = odb12

# Optional override of lineage strategy (workflow-level option)
# Uncomment and set if you want to override YAML setting:
# lineage_strategy = manual

