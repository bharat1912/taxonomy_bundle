# CompareM2 Configuration — taxonomy_bundle
# March 2026
# USAGE: pixi run -e env-cm2 comparem2 \
#            --configfile config/config_comparem2.yaml \
#            --config input_genomes="path/to/*.fa" output_directory="results"
#
# IMPORTANT: output_directory must be pre-created with mkdir -p
# IMPORTANT: Use absolute path without trailing slash for output_directory

# Default output directory (relative - override per run)
output_directory: "results_comparem2"

annotator: "bakta"

# Skip AMRFinder inside bakta
# (version mismatch between container bakta and vault amrfinderplus-db)
set_bakta--skip-amr: ""

set_eggnog--data_dir: "/media/bharat/volume1/databases/eggnog"
set_amrfinder--database: "/media/bharat/volume1/databases/bakta/amrfinderplus-db/latest"
set_antismash--databases: "/media/bharat/volume1/databases/antismash"
set_dbcan--db_dir: "/media/bharat/volume1/databases/comparem2_db/cm2_v2.16/dbcan"
