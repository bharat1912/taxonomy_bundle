<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="720" viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1000" height="720" fill="#F8FAFB"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F5C99">MiGA Workflow in taxonomy_bundle</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#666">MiGA v1.4.1.6 via Pixi — Genome Quality, Taxonomy Classification &amp; Ref-Tree Generation</text>
  <line x1="80" y1="68" x2="920" y2="68" stroke="#1F5C99" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- COLUMN HEADERS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="130" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F5C99">INPUT</text>
  <text x="390" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F5C99">PIXI TASK</text>
  <text x="640" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F5C99">MiGA STEP</text>
  <text x="870" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F5C99">OUTPUT</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: SETUP -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="108" width="220" height="74" rx="8" fill="#E8F4FD" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="130" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F5C99">New System</text>
  <text x="130" y="145" text-anchor="middle" font-size="11" fill="#404040">pixi.toml + vault drive</text>
  <text x="130" y="160" text-anchor="middle" font-size="11" fill="#404040">TypeMat_Lite (~50 GB)</text>
  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#404040">Phyla_Lite (~5 GB)</text>

  <!-- Arrow -->
  <line x1="242" y1="145" x2="278" y2="145" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="108" width="220" height="74" rx="8" fill="#EBF5FB" stroke="#2980B9" stroke-width="1.5"/>
  <text x="390" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F5C99">Setup Tasks</text>
  <text x="390" y="145" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">miga-setup-proxies</text>
  <text x="390" y="160" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">miga-setup-vault-config</text>
  <text x="390" y="175" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">install-miga-gem</text>

  <!-- Arrow -->
  <line x1="502" y1="145" x2="538" y2="145" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="108" width="220" height="74" rx="8" fill="#EBF5FB" stroke="#2980B9" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F5C99">Environment Check</text>
  <text x="650" y="145" text-anchor="middle" font-size="10.5" fill="#404040">Ruby gem v1.4.1.6</text>
  <text x="650" y="160" text-anchor="middle" font-size="10.5" fill="#404040">.miga_rc + .miga_modules</text>
  <text x="650" y="175" text-anchor="middle" font-size="10.5" fill="#404040">Vault symlinks verified</text>

  <!-- Arrow -->
  <line x1="762" y1="145" x2="798" y2="145" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="800" y="108" width="180" height="74" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="890" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A6B3C">✓ Ready</text>
  <text x="890" y="145" text-anchor="middle" font-size="10.5" fill="#404040">pixi run miga-check-env</text>
  <text x="890" y="160" text-anchor="middle" font-size="10.5" fill="#404040">pixi run miga-cli about</text>
  <text x="890" y="175" text-anchor="middle" font-size="10.5" fill="#404040">pixi run list-db</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DIVIDER -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="80" y1="196" x2="920" y2="196" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="210" text-anchor="middle" font-size="11" fill="#888" font-style="italic">— Run once per system —  below runs per genome / collection —</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: QUALITY -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="220" width="220" height="74" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F5800">Genome FASTA(s)</text>
  <text x="130" y="257" text-anchor="middle" font-size="11" fill="#404040">Isolate / MAG / SAG</text>
  <text x="130" y="272" text-anchor="middle" font-size="11" fill="#404040">Single or batch (*.fasta)</text>
  <text x="130" y="287" text-anchor="middle" font-size="11" fill="#888">e.g. bin21.fasta (3.4 Mb)</text>

  <line x1="242" y1="257" x2="278" y2="257" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="280" y="220" width="220" height="74" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="390" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F5800">Quality Workflow</text>
  <text x="390" y="257" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">pixi run miga quality_wf</text>
  <text x="390" y="272" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  --type genome</text>
  <text x="390" y="287" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  -o OUTPUT genome.fasta</text>

  <line x1="502" y1="257" x2="538" y2="257" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="540" y="220" width="220" height="74" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="650" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F5800">MiGA Steps</text>
  <text x="650" y="257" text-anchor="middle" font-size="10.5" fill="#404040">assembly → CDS → essential_genes</text>
  <text x="650" y="272" text-anchor="middle" font-size="10.5" fill="#404040">mytaxa → ssu → stats</text>
  <text x="650" y="287" text-anchor="middle" font-size="10.5" fill="#888">~5–15 min per genome</text>

  <line x1="762" y1="257" x2="798" y2="257" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="800" y="220" width="180" height="74" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="890" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F5800">Quality Report</text>
  <text x="890" y="257" text-anchor="middle" font-size="10.5" fill="#404040">genome_stats.tsv</text>
  <text x="890" y="272" text-anchor="middle" font-size="10.5" fill="#404040">completeness / contamination</text>
  <text x="890" y="287" text-anchor="middle" font-size="10.5" fill="#404040">essential genes / tRNA / rRNA</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: CLASSIFY -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="308" width="220" height="74" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="130" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B2C6F">Genome FASTA(s)</text>
  <text x="130" y="345" text-anchor="middle" font-size="11" fill="#404040">+ TypeMat_Lite (~50 GB)</text>
  <text x="130" y="360" text-anchor="middle" font-size="11" fill="#404040">  28,548 type material genomes</text>
  <text x="130" y="375" text-anchor="middle" font-size="11" fill="#888">or Phyla_Lite (~5 GB)</text>

  <line x1="242" y1="345" x2="278" y2="345" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <rect x="280" y="308" width="220" height="74" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="390" y="328" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B2C6F">Classify Workflow</text>
  <text x="390" y="345" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">pixi run miga classify_wf</text>
  <text x="390" y="360" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  --db-path $MIGA_HOME/</text>
  <text x="390" y="375" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">      TypeMat_Lite</text>

  <line x1="502" y1="345" x2="538" y2="345" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <rect x="540" y="308" width="220" height="74" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="650" y="328" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B2C6F">FastAAI → Diamond AAI</text>
  <text x="650" y="345" text-anchor="middle" font-size="10.5" fill="#404040">hAAI screen → full AAI</text>
  <text x="650" y="360" text-anchor="middle" font-size="10.5" fill="#404040">p-value taxonomy transfer</text>
  <text x="650" y="375" text-anchor="middle" font-size="10.5" fill="#888">~15–30 min per genome</text>

  <line x1="762" y1="345" x2="798" y2="345" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <rect x="800" y="308" width="180" height="74" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="890" y="328" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B2C6F">Taxonomy Result</text>
  <text x="890" y="345" text-anchor="middle" font-size="10.5" fill="#404040">taxonomy.tsv</text>
  <text x="890" y="360" text-anchor="middle" font-size="10.5" fill="#404040">classification.tsv</text>
  <text x="890" y="375" text-anchor="middle" font-size="10.5" fill="#404040">closest relative + AAI + p-values</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 4: DAEMON + REFTREE (spans two visual rows) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="396" width="220" height="160" rx="8" fill="#EBF5FB" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="130" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F5C99">Project Setup</text>
  <text x="130" y="436" text-anchor="middle" font-size="11" fill="#404040" font-family="Courier New">miga-new-project</text>
  <text x="130" y="452" text-anchor="middle" font-size="11" fill="#888">↓</text>
  <text x="130" y="468" text-anchor="middle" font-size="11" fill="#404040" font-family="Courier New">miga-cli edit</text>
  <text x="130" y="484" text-anchor="middle" font-size="10" fill="#888">-m ref_project=TypeMat_Lite</text>
  <text x="130" y="500" text-anchor="middle" font-size="11" fill="#888">↓</text>
  <text x="130" y="516" text-anchor="middle" font-size="11" fill="#404040" font-family="Courier New">miga-cli add</text>
  <text x="130" y="532" text-anchor="middle" font-size="10" fill="#888">-t genome -i assembly fasta</text>
  <text x="130" y="548" text-anchor="middle" font-size="10.5" fill="#888">Required before daemon</text>

  <line x1="242" y1="476" x2="278" y2="476" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="396" width="220" height="160" rx="8" fill="#EBF5FB" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="390" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F5C99">Daemon Workflow</text>
  <text x="390" y="436" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">pixi run miga-cli daemon</text>
  <text x="390" y="452" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  start -P &lt;project&gt;</text>
  <text x="390" y="468" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  --shutdown-when-done</text>
  <text x="390" y="490" text-anchor="middle" font-size="10" fill="#888">Monitor:</text>
  <text x="390" y="506" text-anchor="middle" font-size="10" fill="#888" font-family="Courier New">watch -n 30 "miga-cli ls</text>
  <text x="390" y="522" text-anchor="middle" font-size="10" fill="#888" font-family="Courier New">  --processing"</text>
  <text x="390" y="544" text-anchor="middle" font-size="10" fill="#888">Run inside tmux session</text>

  <line x1="502" y1="476" x2="538" y2="476" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="396" width="220" height="160" rx="8" fill="#EBF5FB" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="650" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F5C99">All MiGA Steps</text>
  <text x="650" y="436" text-anchor="middle" font-size="10.5" fill="#404040">assembly → cds</text>
  <text x="650" y="452" text-anchor="middle" font-size="10.5" fill="#404040">essential_genes → mytaxa</text>
  <text x="650" y="468" text-anchor="middle" font-size="10.5" fill="#404040">taxonomy → distances</text>
  <text x="650" y="490" text-anchor="middle" font-size="10.5" fill="#404040">FastAAI → Diamond AAI → ANI</text>
  <text x="650" y="506" text-anchor="middle" font-size="10.5" fill="#404040">ssu → stats</text>
  <text x="650" y="524" text-anchor="middle" font-size="10" fill="#888">aai.db written to</text>
  <text x="650" y="540" text-anchor="middle" font-size="10" fill="#888">09.distances/05.taxonomy/</text>

  <line x1="762" y1="476" x2="798" y2="476" stroke="#1F5C99" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="800" y="396" width="180" height="160" rx="8" fill="#EBF5FB" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="890" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F5C99">Full Results</text>
  <text x="890" y="436" text-anchor="middle" font-size="10.5" fill="#404040">taxonomy.tsv</text>
  <text x="890" y="452" text-anchor="middle" font-size="10.5" fill="#404040">classification.tsv</text>
  <text x="890" y="468" text-anchor="middle" font-size="10.5" fill="#404040">essential_genes.tsv</text>
  <text x="890" y="484" text-anchor="middle" font-size="10.5" fill="#404040">assembly.tsv + cds.tsv</text>
  <text x="890" y="500" text-anchor="middle" font-size="10.5" fill="#404040">bin.aai.db (distances)</text>
  <text x="890" y="516" text-anchor="middle" font-size="10.5" fill="#404040">bin.intax.txt</text>
  <text x="890" y="534" text-anchor="middle" font-size="10.5" fill="#404040">index.html (browse)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 5: REFTREE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="572" width="220" height="74" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="130" y="592" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A6B3C">After Daemon Done</text>
  <text x="130" y="609" text-anchor="middle" font-size="11" fill="#404040">bin.aai.db → bin.aai.tsv</text>
  <text x="130" y="624" text-anchor="middle" font-size="11" fill="#404040">r-phangorn + r-phytools</text>
  <text x="130" y="639" text-anchor="middle" font-size="11" fill="#404040">enveomics.R</text>

  <line x1="242" y1="609" x2="278" y2="609" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="280" y="572" width="220" height="74" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="390" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A6B3C">Ref-Tree Task</text>
  <text x="390" y="609" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">pixi run miga-reftree</text>
  <text x="390" y="624" text-anchor="middle" font-size="10.5" fill="#404040" font-family="Courier New">  &lt;project&gt; &lt;bin_name&gt;</text>
  <text x="390" y="639" text-anchor="middle" font-size="10" fill="#888">calls ref-tree.R via $GEM_HOME</text>

  <line x1="502" y1="609" x2="538" y2="609" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="540" y="572" width="220" height="74" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="650" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A6B3C">BioNJ Tree</text>
  <text x="650" y="609" text-anchor="middle" font-size="10.5" fill="#404040">AAI distance matrix → BioNJ</text>
  <text x="650" y="624" text-anchor="middle" font-size="10.5" fill="#404040">midpoint rooting (phangorn)</text>
  <text x="650" y="639" text-anchor="middle" font-size="10.5" fill="#404040">fan layout — query in red</text>

  <line x1="762" y1="609" x2="798" y2="609" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="800" y="572" width="180" height="74" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="890" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A6B3C">Ref-Tree Output</text>
  <text x="890" y="609" text-anchor="middle" font-size="10.5" fill="#404040">bin.reftree.nwk</text>
  <text x="890" y="624" text-anchor="middle" font-size="10.5" fill="#404040">bin.reftree.nwk.pdf</text>
  <text x="890" y="639" text-anchor="middle" font-size="10" fill="#888">Query genome in red</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="658" width="960" height="52" rx="6" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1"/>
  <text x="40" y="676" font-size="11" font-weight="bold" fill="#404040">Rows:</text>

  <rect x="90" y="664" width="14" height="14" rx="3" fill="#E8F4FD" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="110" y="676" font-size="11" fill="#404040">Setup (once)</text>

  <rect x="200" y="664" width="14" height="14" rx="3" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="220" y="676" font-size="11" fill="#404040">quality_wf</text>

  <rect x="305" y="664" width="14" height="14" rx="3" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="325" y="676" font-size="11" fill="#404040">classify_wf</text>

  <rect x="415" y="664" width="14" height="14" rx="3" fill="#EBF5FB" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="435" y="676" font-size="11" fill="#404040">daemon (project-based)</text>

  <rect x="590" y="664" width="14" height="14" rx="3" fill="#E8F8F5" stroke="#27AE60" stroke-width="1.5"/>
  <text x="610" y="676" font-size="11" fill="#404040">miga-reftree (fan tree PDF)</text>

  <text x="40" y="698" font-size="10.5" fill="#888">classify_wf and daemon both classify genomes — daemon additionally generates .aai.db for ref-tree.   $MIGA_HOME = $PIXI_PROJECT_ROOT/db_link/miga_db</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1F5C99"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F39C12"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8E44AD"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27AE60"/>
    </marker>
  </defs>

</svg>
