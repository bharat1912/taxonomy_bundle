  ln -sfn "$EXTERNAL_VAULT/eggnog" "$PIXI_PROJECT_ROOT/db_link/eggnog" && \
  ln -sfn "$EXTERNAL_VAULT/miga_db" "$PIXI_PROJECT_ROOT/db_link/miga_db" && \
