  ln -sfn "$EXTERNAL_VAULT/kraken2" "$PIXI_PROJECT_ROOT/db_link/kraken2" && \
  echo "SUCCESS: Full 18-Database Vault active at $EXTERNAL_VAULT"
"""
description = "Universal Infrastructure: Provisions all docking bays and high-capacity temporary storage"

[tasks.vault-audit]
cmd = """
  bash -c "
  echo '================================================================'
  echo '          SOVEREIGN VAULT: STORAGE AUDIT PROTOCOL'
  echo '================================================================'
  echo '1. RECLAIMED SPACE (Logical links):'
  du -sh $PIXI_PROJECT_ROOT/db_link
  
  echo -e '\n2. PHYSICAL OCCUPANCY (1.5TB Vault):'
  df -h $EXTERNAL_VAULT | awk 'NR==2 {print \\\"used: \\\" \\$3 \\\" out of \\\" \\$2}'
  
  echo -e '\n3. TOP HEAVYWEIGHTS (5 Largest):'
  du -sh $EXTERNAL_VAULT/* 2>/dev/null | sort -rh | head -n 5
  echo '================================================================'
  "
"""
