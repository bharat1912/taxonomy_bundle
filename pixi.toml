# ── PHASE 0: HELP ─────────────────────────────────────────────────────────────
[feature.baclife.tasks.baclife-help]
description = "Displays the bacLIFE workflow roadmap and all available commands"
cmd = """echo "
================================================================
   bacLIFE WORKFLOW: LIFESTYLE ANALYSIS PIPELINE
================================================================
SETUP (run once per machine, in order):
  1. baclife-install       Clone bacLIFE from Carrion-lab
  2. baclife-patch         Apply taxonomy_bundle patches (REQUIRED after install)
  3. baclife-db-init       Download antiSMASH + bacLIFE databases
  4. baclife-eggnog-fix    Fix eggNOG mirror URL + download DB
  5. baclife-verify        Verify all files are present and patched
  OR run all at once: baclife-setup-full

DATA PREPARATION (run per project):
  baclife-load-genomes  Link genomes from vault to data/ (4-part names)
  baclife-update-names  Check names_equivalence.txt for missing genomes

EXECUTION:
  baclife-run           Run snakemake (resume from last checkpoint)
  baclife-run-fresh     Clean + load genomes + run (full fresh pipeline)
  baclife-forcerun      Force rerun clustering + phylophlan + run

ANALYSIS:
  baclife-lag-analysis  Run LAG extraction R script (v5)
  baclife-lag-summary   Run LAG summary + Rnf analysis R script

MAINTENANCE:
  baclife-clean         Remove old intermediates (preserves mapping_file.txt)
  baclife-status        Show current run status and output file sizes
================================================================
WARNING: Do NOT git clone/pull bacLIFE into this directory.
         This will overwrite the patches. See BACLIFE_VERSION.md.
================================================================
"
"""

# --- PHASE I: INFRASTRUCTURE ---
[feature.baclife.tasks.baclife-install]
description = "Clones bacLIFE from Carrion-lab. Run baclife-patch after this."
cmd = "bash -c \"if [ ! -d bacLIFE ]; then git clone https://github.com/Carrion-lab/bacLIFE.git && echo bacLIFE cloned - now run baclife-patch; else echo bacLIFE already exists; fi\""

[feature.baclife.tasks.baclife-patch]
description = "Verifies taxonomy_bundle patches are in place after baclife-install. See bacLIFE/BACLIFE_VERSION.md."
cmd = """
  python3 -c "
import os, sys
checks = [
  ('bacLIFE/Snakefile', 'rm -rf intermediate_files/clustering'),
  ('bacLIFE/Snakefile', 'mapping_file_baclife_generated'),
  ('bacLIFE/src/rename_MEGAMATRIX.R', 'mapping_file_baclife_generated'),
  ('bacLIFE/names_equivalence.txt', None),
  ('bacLIFE/config.json', None),
  ('bacLIFE/extract_TH_LAGs_v5.R', None),
  ('bacLIFE/TH_LAG_summary_v5.R', None),
  ('bacLIFE/BACLIFE_VERSION.md', None),
]
all_ok = True
for fpath, pattern in checks:
  if not os.path.exists(fpath):
    print(f'MISS {fpath}')
    all_ok = False
  elif pattern:
    with open(fpath) as f:
      if pattern not in f.read():
        print(f'WARN patch missing in {fpath}: {pattern}')
        all_ok = False
      else:
        print(f'OK   {fpath}')
  else:
    print(f'OK   {fpath}')
if all_ok:
  print('')
  print('All patches verified. Next: pixi run -e env-baclife baclife-db-init')
else:
  print('')
  print('Some patches missing. Check git status and re-add if needed.')
  sys.exit(1)
"
"""

[feature.baclife.tasks.baclife-db-init]
description = "Downloads antiSMASH databases and bacLIFE internal dependencies"
cmd = """
  bash -c "if [ -z $EXTERNAL_VAULT ]; then echo ERROR: EXTERNAL_VAULT not set; exit 1; fi && mkdir -p $EXTERNAL_VAULT/antismash $EXTERNAL_VAULT/eggnog && download-antismash-databases --database-dir $EXTERNAL_VAULT/antismash && cd bacLIFE && python src/download_dependencies.py && echo SUCCESS"
"""

[feature.baclife.tasks.baclife-eggnog-fix]
description = "Fixes dead eggNOG mirror URL and downloads eggNOG database to vault"
cmd = """
  bash -c "EGG=$(which download_eggnog_data.py) && sed -i s/eggnogdb.embl.de/eggnog5.embl.de/g $EGG && mkdir -p $EXTERNAL_VAULT/eggnog && download_eggnog_data.py -y -f --data_dir $EXTERNAL_VAULT/eggnog && mkdir -p bacLIFE/databases/mapper_data && ln -sfn $EXTERNAL_VAULT/eggnog/* bacLIFE/databases/mapper_data/ && echo SUCCESS"
"""

[feature.baclife.tasks.baclife-verify]
description = "Verifies bacLIFE Snakefile and key src scripts are present"
cmd = """
  python3 -c "
import os
files = ['bacLIFE/Snakefile','bacLIFE/src/rename_MEGAMATRIX.R','bacLIFE/names_equivalence.txt','bacLIFE/config.json']
[print('OK' if os.path.exists(f) else 'MISS', f) for f in files]
"
"""

# --- PHASE II: DATA PREPARATION ---
[feature.baclife.tasks.baclife-load-genomes]
description = "Links genomes from vault to bacLIFE/data/ with 4-part name check"
cmd = """
  python3 -c "
import os, sys
vault = os.environ.get('EXTERNAL_VAULT')
if not vault:
  print('ERROR: EXTERNAL_VAULT not set'); sys.exit(1)
src = os.path.join(vault, 'ncbi_genomes')
os.makedirs('bacLIFE/data', exist_ok=True)
linked = skipped = 0
for f in os.listdir(src):
  if f.endswith('.fna'):
    base = f[:-4]
    if len(base.split('_')) >= 4:
      dst = os.path.join('bacLIFE/data', f)
      if not os.path.exists(dst):
        os.symlink(os.path.join(src, f), dst)
      linked += 1
    else:
      skipped += 1
print(f'Linked: {linked} | Skipped (wrong format): {skipped}')
"
"""

[feature.baclife.tasks.baclife-update-names]
description = "Checks names_equivalence.txt for any missing genome mappings"
cmd = """
  python3 -c "
import os
neq = set()
with open('bacLIFE/names_equivalence.txt') as f:
  next(f)
  for line in f: neq.add(line.split()[0])
data = [os.path.basename(f).replace('.fna','') for f in os.listdir('bacLIFE/data') if f.endswith('.fna')]
missing = [g for g in data if g not in neq]
if missing:
  print(f'{len(missing)} genomes missing from names_equivalence.txt:')
  [print(f'  {g}') for g in sorted(missing)]
else:
  print(f'All {len(data)} genomes mapped in names_equivalence.txt')
"
"""

# --- PHASE III: EXECUTION ---
[feature.baclife.tasks.baclife-run]
description = "Runs bacLIFE snakemake pipeline (resumes from checkpoint)"
cmd = "cd bacLIFE && snakemake --cores 16 -s Snakefile 2>&1 | tee logs/baclife_$(date +%Y%m%d_%H%M).log"

[feature.baclife.tasks.baclife-run-fresh]
description = "Full fresh pipeline: clean workspace, load genomes, run bacLIFE"
cmd = "pixi run -e env-baclife baclife-clean && pixi run -e env-baclife baclife-load-genomes && pixi run -e env-baclife baclife-run"

[feature.baclife.tasks.baclife-forcerun]
description = "Force reruns clustering and phylophlan rules then continues pipeline"
cmd = "cd bacLIFE && snakemake --cores 16 -s Snakefile --forcerun clustering phylophlan 2>&1 | tee logs/baclife_forcerun_$(date +%Y%m%d_%H%M).log"

# --- PHASE IV: ANALYSIS ---
[feature.baclife.tasks.baclife-lag-analysis]
description = "Runs LAG extraction v5"
cmd = "cd bacLIFE && Rscript extract_TH_LAGs_v5.R 2>&1 | tee logs/LAG_analysis_$(date +%Y%m%d_%H%M).log"

[feature.baclife.tasks.baclife-lag-summary]
description = "Runs LAG summary and Rnf analysis"
cmd = "cd bacLIFE && Rscript TH_LAG_summary_v5.R 2>&1 | tee logs/LAG_summary_$(date +%Y%m%d_%H%M).log"

# --- MAINTENANCE ---
[feature.baclife.tasks.baclife-clean]
description = "Removes old intermediate files and genome symlinks"
cmd = """
  python3 -c "
import os, shutil, glob
for f in glob.glob('bacLIFE/data/*.fna'): os.remove(f)
if os.path.exists('bacLIFE/intermediate_files'): shutil.rmtree('bacLIFE/intermediate_files')
for f in ['bacLIFE/MEGAMATRIX.txt','bacLIFE/MEGAMATRIX_renamed.txt','bacLIFE/mapping_file_baclife_generated.txt']:
  if os.path.exists(f): os.remove(f)
print('Workspace clean. mapping_file.txt preserved.')
"
"""

[feature.baclife.tasks.baclife-status]
description = "Shows current pipeline status and output file sizes"
cmd = """
  python3 -c "
import os
from datetime import datetime
files = [
  'bacLIFE/MEGAMATRIX.txt',
  'bacLIFE/MEGAMATRIX_renamed.txt',
  'bacLIFE/mapping_file.txt',
  'bacLIFE/mapping_file_baclife_generated.txt',
  'bacLIFE/intermediate_files/clustering/binary_matrix.txt',
  'bacLIFE/intermediate_files/phylophlan/output_phylophlan/RAxML_bestTree.input_refined.tre',
  'bacLIFE/intermediate_files/eggnog_annotation/eggnog_annotation.emapper.annotations',
  'bacLIFE/intermediate_files/BiG-SCAPE/big_scape_binary_table.txt',
]
print('=== bacLIFE Pipeline Status ===')
print(f'Genomes in data/: {len([f for f in os.listdir("bacLIFE/data") if f.endswith(".fna")])}')
for f in files:
  if os.path.exists(f):
    sz = os.path.getsize(f)
    mt = datetime.fromtimestamp(os.path.getmtime(f)).strftime('%Y-%m-%d')
    print(f'  OK   {f} ({sz//1024//1024}M, {mt})')
  else:
    print(f'  MISS {f}')
"
"""

[feature.baclife.tasks.baclife-setup-full]
description = "MASTER: Full installation sequence"
cmd = "pixi run -e env-baclife baclife-install && pixi run -e env-baclife baclife-patch && pixi run -e env-baclife baclife-db-init && pixi run -e env-baclife baclife-eggnog-fix && pixi run -e env-baclife baclife-verify && pixi run -e env-baclife baclife-help"


