# THE PORTABLE HANDSHAKE: Tools look here (GitHub Safe)
MIGA_HOME = "$PIXI_PROJECT_ROOT/db_link/miga_db"
MYTAXA_DB = "$PIXI_PROJECT_ROOT/db_link/mytaxa"
