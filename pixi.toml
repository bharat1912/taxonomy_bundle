# ============================================================================
# SYMCLATRON feature stack (Lifestyle Classification)
# ============================================================================
[feature.symclatron-stack.dependencies]
symclatron = "*"

# Usage: pixi run -e env-sym setup-symclatron
[feature.symclatron-stack.tasks]
setup-symclatron = { cmd = """
  # 1. Enforce initial setup
  symclatron setup --force && \
  
  # 2. Neutralize hard-coded paths by locating site-packages dynamically
  SITE_PACKAGES=$(python -c 'import site; print(site.getsitepackages()[0])') && \
  SYM_DATA_SRC=\"$SITE_PACKAGES/symclatron/data\" && \
  
  # 3. Solidify the Vault docking bay
  mkdir -p \"$EXTERNAL_VAULT/symclatron\" && \
  
  # 4. Shatter the local storage barrier via migration
  if [ -d \"$SYM_DATA_SRC\" ] && [ ! -L \"$SYM_DATA_SRC\" ]; then
    cp -r \"$SYM_DATA_SRC/\"* \"$EXTERNAL_VAULT/symclatron/\" && \
    rm -rf \"$SYM_DATA_SRC\" && \
    ln -sfn \"$EXTERNAL_VAULT/symclatron\" \"$SYM_DATA_SRC\" && \
    echo 'SUCCESS: Symclatron database migrated to Sovereign Vault.';
  else
    echo 'NOTICE: Vault link already solidified or source missing.';
  fi
""", description = "Neutralizes local storage bloat by migrating Symclatron data to the Vault" }

# Usage: pixi run -e env-sym test-symclatron to test / verify the setup
test-symclatron = "symclatron test"

# Usage: pixi run -e env-sym symclatron --help to get help
symclatron-help = "symclatron --help"

# Usage: pixi run -e env-sym symclatron classify --genome-dir ./my_results to run a genome


# ============================================================================
# env-nf: Nextflow & DRAM2 Orchestration
# Stepwise usage clis': 
# IA. Validate iSystem (Check the system for errors): pixi run -e env-nf check-system  
# IB Fix ONLY IF validation step has errors: bash scripts/fix_system.sh 
# II. Acquire (Direct Acquisition via Globus): 
#     1. pixi run globus-setup (Once)
#     2. pixi run globus-start (To initiate transfer)
# III. Synchronize Pipeline: pixi run -e env-nf setup-dram-pipeline
# IV. Verify Vault: pixi run -e env-nf dram-verify
# V. Get help: pixi run -e env-nf dram-help
# VI To run: add fasta files in a dir named input_genomes in your project directory AND
# pixi run -e env-nf dram-run 

# Note: Run Download and Prepare steps inside a tmux session to avoid disconnection
# ============================================================================
[feature.env-nf.dependencies]
nextflow = ">=23.10.1"
openjdk = "17.*"
apptainer = "*"
# Adding globus-cli to neutralize dependency conflicts during transfer
globus-cli = ">=3.0"

[feature.env-nf.tasks]
# DIAGNOSTIC
check-system = "bash scripts/check_system.sh"

# FIX THE SYSTEM IF CHECK SHOWS ERROR
fix-system = "bash scripts/fix_system.sh"

# PIPELINE SYNC
setup-dram-pipeline = "nextflow pull WrightonLabCSU/DRAM -r dev"

# NEW: ACQUIRE CONFIG
# This maneuvers the default WrightonLab config into your project root
dram-get-config = "curl -o nextflow.config https://raw.githubusercontent.com/WrightonLabCSU/DRAM/refs/heads/dev/nextflow.config"

dram-verify = { cmd = """
    nextflow run WrightonLabCSU/DRAM -r dev \
        -profile apptainer \
        --annotate \
        --database_dir "$EXTERNAL_VAULT/dram_db" \
        --outdir "$EXTERNAL_VAULT/dram_verify_test" \
        -w "$NEXTFLOW_WORK" \
        --help
    """, description = "Enforces a handshake by using the internal pipeline config" }

# Getting help
dram-help = "nextflow run WrightonLabCSU/DRAM -r dev --help"

# THE EXECUTION ENGINE: Propels your unknown genomes through the DRAM2 pipeline
dram-run = { cmd = """
    nextflow run WrightonLabCSU/DRAM -r dev \
        -profile apptainer \
        --annotate \
        --input_fasta "$PIXI_PROJECT_ROOT/input_genomes" \
        --database_dir "$EXTERNAL_VAULT/dram_db" \
        --outdir "$EXTERNAL_VAULT/dram_results_$(date +%Y%m%d)" \
        -w "$NEXTFLOW_WORK"
    """, description = "Propels unknown NCBI sequences through high-fidelity functional annotation" }


