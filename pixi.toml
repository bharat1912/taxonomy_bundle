    wget -q https://downloads.globus.org/globus-connect-personal/linux/stable/globusconnectpersonal-latest.tgz && 
    tar xzf globusconnectpersonal-latest.tgz && 
    echo 'Extraction complete. Run pixi run globus-connect to link your account.'
    """, description = "Downloads and extracts the Globus client" }

# STEP 2: The Handshake (Interactive)
globus-connect = { cmd = "cd globusconnectpersonal-*/ && ./globusconnectpersonal -setup --no-gui", description = "Initiates the login handshake" }

# STEP 3: The Background Service
globus-start = { cmd = "cd globusconnectpersonal-*/ && ./globusconnectpersonal -start &", description = "Launches Globus in the background" }

# THE MASTER COMMAND (Optional, for convenience)
acquire-dram-vault = { cmd = "pixi run globus-setup && pixi run globus-connect", description = "Full setup and connection of Globus" }


# --- Tool Management ---
# GAN Tool Setup:
# Usage: pixi run setup-gan
setup-gan      = { cmd = "git clone https://github.com/telatin/gan gan_tool", description = "Clones the GAN genus/species tool" }

# Running GAN: Needs genus/species names
# Usage Example: pixi run gan-genus -- --genus Bacillus
gan-genus      = "python ./gan_tool/scripts/gan-genus.py $@"
gan-genus-help = "python ./gan_tool/scripts/gan-genus.py -h"

# OGRI Tool Setup
# Usage: pixi run setup-ogri-b
setup-ogri-b   = { cmd = "git clone https://gitlab.pasteur.fr/GIPhy/OGRI.git OGRI && chmod +x OGRI/OGRI_B.sh", description = "Clones the OGRI benchmarking tool" }

# Running OGRI requires input folders and thread counts
# Usage Example: pixi run ogri_b -- -i ./my_genomes -t 20
ogri_b         = "bash ./OGRI/OGRI_B.sh $@"

# Phantasm: Needs specific phylogenomic parameters
# Usage Example: pixi run phantasm -- --input_dir ./data
phantasm     = "phantasm $@"

# DFAST_QC: Needs custom output directory or specific settings
# Usage Example: pixi run dfast_qc-cli -- --out out_dir input.fna
dfast_qc-cli = { cmd = "dfast_qc", args = ["$@"] }

# DFAST_QC for isolates: GTDB taxonomy only, CheckM disabled (ete3 taxid bug workaround)
# Suitable for isolate genomes - GTDB reps cover all well-characterised taxa
# NOT suitable for MAGs from underrepresented environments (use MiGA + GTDB-Tk instead)
# Usage: pixi run dfast-qc-isolate -i genome.fasta -o results/dfast_qc/sample_name
# Usage (Snakemake): pixi run -e env-checkm2 dfast-qc-isolate -i {input.fasta} -o {output.dir} -n {threads}
dfast-qc-isolate = { cmd = "dfast_qc --enable_gtdb --disable_cc -r $DFAST_QC_REF_DIR", args = ["$@"], description = "GTDB taxonomy for isolates via dfast_qc (CheckM disabled - ete3 bug)" }

# WGET_GENBANK
# Usage: pixi run wget_genbank_wgs
wget_genbank_wgs = { cmd = "bash ./scripts/wgetGenBankWGS/wgetGenBankWGS.sh", description = "Runs the GenBank WGS downloader script" }

# Pangenome Analysis with PIRATE on your Bakta GFFs (Example for disparate species)
run-pirate = "pixi run -e env-pan PIRATE -i results/all_annotations/ -k '--diamond' -t 16"

# Pangenome Analysis with Panaroo (Example for high-stringency)
run-panaroo = "pixi run -e env-pan panaroo -i results/all_annotations/*.gff -o results/pangenome --clean-mode strict"

# Run AliView using the pixi-managed Java
#aliview = "java -jar path/to/aliview.jar"

# Ensure you are pointing to the newly downloaded 1.30 jar file
aliview = "java -Xmx4G -jar $PIXI_PROJECT_ROOT/software/aliview-1.30.jar"

# Usage: pixi run cm2-run -- --input ./my_genomes/*.fna --output ./cm2_results
cm2-run = { cmd = "pixi run -e env-cm2 comparem2 run $@", description = "Runs CompareM2 genome comparison pipeline" }

# Usage: pixi run cm2-help
cm2-help = { cmd = "pixi run -e env-cm2 comparem2 --help", description = "Shows CompareM2 usage" }


