# identify wrappers- pixi run miga-setup-proxies
# Generate the config- pixi run miga-setup-vault-config
# install engine- pixi run install-miga-gem
# verify installation- pixi run miga-check-env AND ALSO pixi run miga-cli about

# STEPS to download database
# Activate env from the Firewall- pixi shell -e env-a
# pixi run get-miga-phyla
# tmux new -s typemat AND than pixi run get-miga-type AND watch the download ---
# --------- watch -n 60 "du -sh /<path_to_database>"
# pixi run get-miga-uncultivated
# pixi run get-miga-gtdb

# --------------------------------------------------------------------------------
# --- 1. THE SOVEREIGN ENGINE HOOKS --------------------------

[tasks.miga-setup-proxies]
description = "Deploys wrappers to satisfy MiGA identity checks and prioritizes Pixi tools"
cmd = """
  mkdir -p .pixi/envs/default/bin &&
  printf '#!/bin/bash\nmiga "$@"\n' > .pixi/envs/default/bin/MyTaxa &&
  printf '#!/bin/bash\nmiga "$@"\n' > .pixi/envs/default/bin/mytaxa &&
  printf '#!/bin/bash\nktImportTaxonomy "$@"\n' > .pixi/envs/default/bin/ktImportText &&
  chmod +x .pixi/envs/default/bin/MyTaxa .pixi/envs/default/bin/mytaxa .pixi/envs/default/bin/ktImportText &&
  echo 'SUCCESS: Sovereign wrappers deployed.'
"""

[tasks.miga-setup-vault-config]
# Usage: pixi run miga-setup-vault-config
cmd = "bash scripts/setup_miga_config.sh"
description = "GitHub Safe: Automatically generates MiGA config in the Vault (Bypasses miga init)"

[tasks.miga-cli]
# Usage: pixi run miga-cli [ANY_MIGA_COMMAND]
cmd = "miga"
description = "Direct MiGA access. Portable and Vault-aware."

[tasks.miga-run]
# Usage: pixi run miga-run [TASK_NAME] -P [PROJECT_PATH]
cmd = "miga run -P \"$@\""
description = "Executes single MiGA tasks using the modern 1.4.1.1 syntax"

# --- 2. DATABASE ACQUISITION (HOME STORAGE) ----------

[tasks.get-miga-phyla]
description = "Native MiGA download of Phyla_Lite (~7.5GB)"
cmd = "pixi run miga-cli db --database Phyla_Lite \"$MIGA_HOME/Phyla_Lite\""

[tasks.get-miga-type]
description = "TypeMat_Lite download (~52GB, resumable) to visible miga_db folder"
cmd = """
  set -e
  
  echo "Downloading TypeMat_Lite (~52 GB)..."
  echo "Destination: $EXTERNAL_VAULT/miga_db/TypeMat_Lite"
  
  mkdir -p "$EXTERNAL_VAULT/miga_db/TypeMat_Lite" && \
  cd "$EXTERNAL_VAULT/miga_db/TypeMat_Lite" && \
  
  wget -c --tries=0 --retry-connrefused --waitretry=10 \
    --read-timeout=300 --timeout=300 --progress=bar:force \
    https://gatech.microbial-genomes.org/TypeMat_Lite.tar.gz && \
  
  echo "Verifying archive..." && \
  tar -tzf TypeMat_Lite.tar.gz > /dev/null && \
  
  echo "Extracting (15-30 minutes)..." && \
  tar -xzf TypeMat_Lite.tar.gz && \
  
  echo "Removing archive to save 52 GB..." && \
  rm TypeMat_Lite.tar.gz && \
  
  echo "SUCCESS! Database ready at:" && \
  echo "  $PIXI_PROJECT_ROOT/db_link/miga_db/TypeMat_Lite" && \
  echo "Verify: pixi run miga-cli db --list"
"""

[tasks.download-mytaxa-db]
description = "Downloads MyTaxa db files + AllGenomes.faa.dmnd (required by MiGA)"
cmd = """
  python scripts/download_mytaxa_robust.py $EXTERNAL_VAULT/mytaxa && \
  echo 'Downloading AllGenomes.faa.dmnd (~15GB)...' && \
  wget -c \
    http://enve-omics.ce.gatech.edu/data/public_mytaxa/AllGenomes.faa.dmnd \
    -O $EXTERNAL_VAULT/mytaxa/AllGenomes.faa.dmnd && \
  echo 'Symlinking AllGenomes.faa.dmnd to .miga_db...' && \
  mkdir -p $HOME/.miga_db && \
  ln -sfn $EXTERNAL_VAULT/mytaxa/AllGenomes.faa.dmnd $HOME/.miga_db/AllGenomes.faa.dmnd && \
  echo 'Done! MyTaxa fully installed.'
"""

# --- 3. MIGA-CHECK: Compatibility & Environment Verification --------
[tasks.miga-check-env]
description = "Verifies visibility via the visible Bridge"
cmd = """
  echo '--- System Check ---' &&
  miga --version &&
  echo '--- Bridge Verification ---' &&
  ls -ld $PIXI_PROJECT_ROOT/db_link/miga_db &&
  echo '--- Database Contents ---' &&
  ls -F $PIXI_PROJECT_ROOT/db_link/miga_db
"""

[tasks.miga-doctor]
description = "Runs diagnostics on TypeMat_Lite in the visible Vault"
cmd = "miga doctor -P $PIXI_PROJECT_ROOT/db_link/miga_db/TypeMat_Lite"

# --- 4. BY-PASS miga init: Create Projects Without Overwriting Config --------------
[tasks.miga-new-project]
description = "Creates MiGA project (PROJECT_NAME=name pixi run miga-new-project)"
cmd = "bash scripts/create_miga_project.sh"

# Usage examples (documentation only):
# Default:          pixi run miga-new-project
# Custom name:      pixi run miga-new-project ecoli_analysis
# Custom type:      pixi run miga-new-project mag_study metagenomes
# Available types:  genomes, metagenomes, popgenomes, viromes, scgenomes

# Default name
# pixi run miga-new-project

# Custom name
# PROJECT_NAME=ecoli_analysis pixi run miga-new-project

# Custom name and type
# PROJECT_NAME=mag_study PROJECT_TYPE=metagenomes pixi run miga-new-project

# ---------------------------------------------------------------------------
# 1C Heavyweight Tasks (Dedicated Tables)
# Use these inside a tmux session 
#
# --- installing and using tmux ---------
# Install tmux system wide: sudo apt-get install tmux
# Start new tmux session, this will be window 0: tmux new -s genomics -n bakta
# Run baktai in window 0: pixi run download-bakta
# Create window 1: Ctrl + B then press C; Now press Ctrl + B, then , (comma) type miga and hit Enter to rename window 1 to miga
# Run miga in window 1: pixi run download-miga
# To switch between windows: Ctrl + B, then 0 (for Bakta) or 1 (for MiGA).
# To detach (safe exit): Ctrl + B, then D
# To reattach: tmux attach -t genomics
# ---------------------------------------------------------------------------
[tasks.download-kraken2]
cmd = """
    echo "Downloading k2_pluspf database (~71GB compressed, ~110GB extracted)..." &&
    mkdir -p "$EXTERNAL_VAULT/kraken2" &&
    aria2c -x 16 -s 16 -k 1M \
        -d "$EXTERNAL_VAULT/kraken2" \
        -o k2_pluspf_20240904.tar.gz \
        https://genome-idx.s3.amazonaws.com/kraken/k2_pluspf_20240904.tar.gz &&
    echo "Extracting..." &&
    tar -xzf "$EXTERNAL_VAULT/kraken2/k2_pluspf_20240904.tar.gz" \
        -C "$EXTERNAL_VAULT/kraken2/" &&
    rm "$EXTERNAL_VAULT/kraken2/k2_pluspf_20240904.tar.gz" &&
    echo "SUCCESS: Kraken2 k2_pluspf database ready at $EXTERNAL_VAULT/kraken2"
"""
description = "Downloads and extracts Kraken2 k2_pluspf database (~110GB) to vault"

[tasks.download-bakta]
# Usage: pixi run download-bakta 

cmd = """
  pixi run setup-vault && 
  mkdir -p $EXTERNAL_VAULT/bakta && 
  cd $EXTERNAL_VAULT/bakta &&
  
  if [ -f "manifest.json" ] || [ -f "version.json" ]; then
    echo "ASSET DETECTED: Bakta database already exists. Skipping download.";
  else
    echo "Starting Resumable Download...";
    echo "Priority 1: Uni-Giessen S3 (Fast Mirror)";
    echo "Priority 2: Zenodo (Global Backup)";
    
    # Attempt Uni-Giessen first with a 10-second timeout to failover quickly
    wget -c --tries=3 --connect-timeout=10 https://s3.computational.bio.uni-giessen.de/bakta-db/db-v6.0.tar.xz || \
    wget -c https://zenodo.org/record/14916843/files/db.tar.xz;
    
    echo "Download complete. Extracting...";
    # We use tar directly for the Giessen file or the automated tool for Zenodo
    if [ -f "db-v6.0.tar.xz" ]; then
        tar -xJf db-v6.0.tar.xz --strip-components=1 && rm db-v6.0.tar.xz;
    else
        pixi run -e env-a bakta_db download --output . --type full;
    fi
    
    ln -sfn $EXTERNAL_VAULT/bakta $PIXI_PROJECT_ROOT/db_link/bakta &&
    echo "SUCCESS: Bakta v6 is ready on the Tower."
  fi
"""
description = "Dual-mirror resilient download (Uni-Giessen S3 + Zenodo fallback)"

[tasks.setup-prokka-db]
# Usage: pixi run setup-prokka-db

description = "Downloads and indexes Prokka databases into the Vault"
cmd = "bash scripts/setup_prokka_db.sh"

[tasks.download-gtdbtk]
# Usage: pixi run download-gtdbtk
# WARNING: 141GB Download | ~250GB Extracted. 

cmd = """
  pixi run setup-vault && 
  mkdir -p $EXTERNAL_VAULT/gtdb_226 && 
  cd $EXTERNAL_VAULT/gtdb_226 && 
  echo 'Starting 141GB GTDB-Tk Download (r226)...' &&
  wget -c https://data.gtdb.ecogenomic.org/releases/release226/226.0/gtdbtk_r226_data.tar.gz && 
  echo 'Download Complete. Starting Extraction (this will take a while)...' &&
  tar -xvzf gtdbtk_r226_data.tar.gz --strip-components=1 && 
  echo 'Extraction finished. Reclaiming 141GB of space...' && 
  rm gtdbtk_r226_data.tar.gz && 
  pixi run -e env-a gtdbtk check_install
"""
description = "High-reliability 141GB GTDB download - MUST run in tmux"

[tasks.download-plassembler]
cmd = """
  pixi run setup-vault && 
  (test -f "$EXTERNAL_VAULT/plassembler/plsdb_2023_11_03_v2.msh" && echo "Plassembler Verified in Vault") || (
    mkdir -p "$EXTERNAL_VAULT/plassembler" && 
    cd "$EXTERNAL_VAULT/plassembler" && 
    echo "Vault empty. Downloading real Plassembler DB (363MB) to $EXTERNAL_VAULT..." && 
    wget -c "https://zenodo.org/records/10158040/files/201123_plassembler_v1.5.0_databases.tar.gz?download=1" -O plassembler.tar.gz && 
    tar -xvzf plassembler.tar.gz --strip-components=1 && 
    rm plassembler.tar.gz && 
    echo "SUCCESS: Full Plassembler DB installed in Vault."
  )
"""
description = "Verified stable download using Pixi-compatible logic"

[tasks.download-dfast-qc-gtdb-genomes]
description = """
  Full GTDB reference setup for dfast_qc offline GTDB search.
  Downloads GTDB r226 representative genomes (~127GB tar.gz, ~30GB extracted),
  sp_clusters.tsv, rebuilds mash sketch, and rebuilds SQLite gtdb_reference table.
  Run once after initial setup or when GTDB version is updated.
  IMPORTANT: Run inside tmux - takes 1-2 hours total.
  Steps: download → extract → delete tar.gz → sp_clusters → mash sketch → sqlite db
"""
cmd = """
  DQC_DIR=$DFAST_QC_REF_DIR && \
  DQC_TOOL=$(ls -d $PIXI_PROJECT_ROOT/.pixi/envs/env-checkm2/opt/dfast_qc-*/  2>/dev/null | tail -1) && \
  echo "=== Step 1: Download GTDB r226 genomes ===" && \
  mkdir -p $DQC_DIR/gtdb_genomes_reps/database && \
  wget -c https://data.gtdb.ecogenomic.org/releases/latest/genomic_files_reps/gtdb_genomes_reps.tar.gz \
      -O $DQC_DIR/gtdb_genomes_reps.tar.gz && \
  echo "=== Step 2: Extract ===" && \
  tar xfz $DQC_DIR/gtdb_genomes_reps.tar.gz \
      --strip-components=1 \
      -C $DQC_DIR/gtdb_genomes_reps/ && \
  echo "=== Step 3: Delete tar.gz to free space ===" && \
  rm $DQC_DIR/gtdb_genomes_reps.tar.gz && \
  echo "=== Step 4: Download sp_clusters.tsv ===" && \
  wget -c https://data.gtdb.ecogenomic.org/releases/latest/auxillary_files/sp_clusters.tsv \
      -O $DQC_DIR/sp_clusters.tsv && \
  echo "=== Step 5: Delete old GTDB mash sketch if present ===" && \
  rm -f $DQC_DIR/gtdb_genomes_sketch.msh && \
  echo "=== Step 6: Rebuild mash sketch from local genomes (~60 min) ===" && \
  python $DQC_TOOL/dqc_admin_tools.py mash_gtdb_sketch \
      --ref_dir $DQC_DIR --num_threads 8 && \
  echo "=== Step 7: Rebuild SQLite gtdb_reference table ===" && \
  python $DQC_TOOL/dqc_admin_tools.py prepare_sqlite_db \
      --for_gtdb --ref_dir $DQC_DIR && \
  echo "=== Done! GTDB reference fully built for dfast_qc offline search ==="
"""

