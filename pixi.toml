  mkdir -p "$EXTERNAL_VAULT/gtdb_226" "$EXTERNAL_VAULT/bakta" "$EXTERNAL_VAULT/plassembler" \
           "$EXTERNAL_VAULT/checkm2" "$EXTERNAL_VAULT/taxonkit" "$EXTERNAL_VAULT/busco" \
           "$EXTERNAL_VAULT/dfast_qc_ref" "$EXTERNAL_VAULT/symclatron" "$EXTERNAL_VAULT/dram_db" \
           "$EXTERNAL_VAULT/mytaxa" "$EXTERNAL_VAULT/krona" "$EXTERNAL_VAULT/prokka_db" \
           "$EXTERNAL_VAULT/antismash" "$EXTERNAL_VAULT/eggnog" "$EXTERNAL_VAULT/symclatron" \
           "$EXTERNAL_VAULT/miga_db" "$EXTERNAL_VAULT/tmp" "$EXTERNAL_VAULT/comparem2_db" \
           "$EXTERNAL_VAULT/comparem2_conda" "$EXTERNAL_VAULT/kraken2" && \

  echo "SOLIDIFYING: Establishing Portal at $PIXI_PROJECT_ROOT/db_link..." &&
