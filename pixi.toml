  ln -sfn "$EXTERNAL_VAULT/checkm2" "$PIXI_PROJECT_ROOT/db_link/checkm2" && \
  ln -sfn "$EXTERNAL_VAULT/taxonkit" "$PIXI_PROJECT_ROOT/db_link/taxonkit" && \
  ln -sfn "$EXTERNAL_VAULT/mytaxa" "$PIXI_PROJECT_ROOT/db_link/mytaxa" && \
  ln -sfn "$EXTERNAL_VAULT/krona" "$PIXI_PROJECT_ROOT/db_link/krona" && \
  ln -sfn "$EXTERNAL_VAULT/busco" "$PIXI_PROJECT_ROOT/db_link/busco" && \
  ln -sfn "$EXTERNAL_VAULT/busco" "$PIXI_PROJECT_ROOT/busco_downloads" && \
  ln -sfn "$EXTERNAL_VAULT/dfast_qc_ref" "$PIXI_PROJECT_ROOT/db_link/dfast_qc_ref" && \
  ln -sfn "$EXTERNAL_VAULT/prokka_db" "$PIXI_PROJECT_ROOT/db_link/prokka" && \
