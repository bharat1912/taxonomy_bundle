# ============================================================================
# taxonomy_bundle : Integrated bioinformatics environment for microbial taxonomy
# Author: Bharat Patel
# ============================================================================
[project]
name = "taxonomy_bundle"
version = "0.1.0"
description = "An integrated bioinformatics bundle for taxonomy analysis (OGRI, MiGA, GToTree, BIT, PHANTASM, DFAST-QC, NCBI utilities, etc.)"
authors = ["Bharat Patel <bharatgu19@gmail.com>"]

channels = ["rpetit3", "astrobiomike", "conda-forge", "bioconda", "https://repo.prefix.dev/astrogenomics"]
platforms = ["linux-64"]


