# USER ACTION REQUIRED FOR INSTALLING DATABASE iN A HIGH CAPACITY DRIVE:
# 1. Best Practice: Add 'export EXTERNAL_VAULT="/your/big/drive"' to your ~/.bashrc
# --- Example: export EXTERNAL_VAULT="/media/your_drive/databases"
# 2. FALLBACK: If not set in .bashrc, database will install in the project's 'db_local' folder.
#    WARNING: Large databases (400GB+) may exhaust space on your primary drive!
EXTERNAL_VAULT = "${EXTERNAL_VAULT:-$PIXI_PROJECT_ROOT/db_local}"

# The Portal: This connects your code to the vault defined above
CENTRAL_DB_PATH = "$PIXI_PROJECT_ROOT/db_link"

