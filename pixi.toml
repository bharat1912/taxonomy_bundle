  echo "INVOKING: Linking Bridges..."
  ln -sfn "$EXTERNAL_VAULT/gtdb_226" "$PIXI_PROJECT_ROOT/db_link/gtdbtk" && \
  ln -sfn "$EXTERNAL_VAULT/bakta" "$PIXI_PROJECT_ROOT/db_link/bakta" && \
